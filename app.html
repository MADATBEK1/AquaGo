<body class="auth-page">

    <!-- Electron Custom Title Bar -->
    <div class="titlebar" id="titlebar">
        <div class="titlebar-drag">
            <span class="titlebar-icon">💧</span>
            <span class="titlebar-name">AquaGo</span>
        </div>
        <div class="titlebar-controls">
            <button class="tb-btn minimize" onclick="tbMinimize()" title="Kichraytirish">─</button>
            <button class="tb-btn maximize" onclick="tbMaximize()" title="Kattalashtirish">□</button>
            <button class="tb-btn close" onclick="tbClose()" title="Yopish">✕</button>
        </div>
    </div>


    <!-- Background animated bubbles -->
    <div class="bg-bubbles">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>
        <div class="bubble b5"></div>
    </div>

    <!-- Auth Container -->
    <div class="auth-wrapper">

        <!-- Logo -->
        <div class="logo-block">
            <div class="logo-icon">💧</div>
            <h1 class="logo-title">AquaGo</h1>
            <p class="logo-subtitle">Suv yetkazib berish platformasi</p>
        </div>

        <!-- Role Selector -->
        <div class="role-selector" id="roleSelector">
            <button class="role-btn active" id="btnUser" onclick="selectRole('user')">
                <span class="role-icon">🏠</span>
                <span>Mijoz</span>
            </button>
            <button class="role-btn" id="btnDriver" onclick="selectRole('driver')">
                <span class="role-icon">🚗</span>
                <span>Suvchi</span>
            </button>
        </div>

        <!-- Tab Switcher -->
        <div class="tab-switcher">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Kirish</button>
            <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Ro'yxatdan o'tish</button>
        </div>

        <!-- Login Form -->
        <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginPhone">Telefon raqam</label>
                <div class="input-wrapper">
                    <span class="input-icon">📱</span>
                    <input type="text" id="loginPhone" placeholder="+998 90 123 45 67" required />
                </div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Parol</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="loginPassword" placeholder="Parolni kiriting" required />
                    <button type="button" class="eye-btn" onclick="togglePass('loginPassword', this)">👁️</button>
                </div>
            </div>
            <div class="error-msg" id="loginError"></div>
            <button type="submit" class="submit-btn" id="loginSubmitBtn">
                <span>Kirish</span>
                <div class="btn-loader" id="loginLoader"></div>
            </button>

            <!-- Demo Credentials -->
            <div class="demo-section">
                <div class="demo-label">⚡ Tez kirish (Demo)</div>
                <div class="demo-btns">
                    <button type="button" class="demo-btn demo-user" onclick="fillDemo('user')">
                        🏠 Mijoz bo'lib kir
                    </button>
                    <button type="button" class="demo-btn demo-driver" onclick="fillDemo('driver')">
                        🚗 Suvchi bo'lib kir
                    </button>
                </div>
            </div>
        </form>

        <!-- Register Form -->
        <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="regName">Ism Familiya</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="regName" placeholder="Ismingizni kiriting" required />
                </div>
            </div>
            <div class="form-group">
                <label for="regPhone">Telefon raqam</label>
                <div class="input-wrapper">
                    <span class="input-icon">📱</span>
                    <input type="text" id="regPhone" placeholder="+998 90 123 45 67" required />
                </div>
            </div>
            <div class="form-group" id="vehicleGroup" style="display:none">
                <label for="regVehicle">Mashina raqami</label>
                <div class="input-wrapper">
                    <span class="input-icon">🚗</span>
                    <input type="text" id="regVehicle" placeholder="01 A 123 BC" />
                </div>
            </div>
            <div class="form-group" id="cardGroup" style="display:none">
                <label for="regCard">Karta raqami (Click/Payme uchun)</label>
                <div class="input-wrapper">
                    <span class="input-icon">💳</span>
                    <input type="text" id="regCard" placeholder="8600 1234 5678 9012" maxlength="19" />
                </div>
            </div>
            <div class="form-group">
                <label for="regPassword">Parol</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="regPassword" placeholder="Parol yarating" required />
                    <button type="button" class="eye-btn" onclick="togglePass('regPassword', this)">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label for="regPassword2">Parolni tasdiqlang</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="regPassword2" placeholder="Parolni qayta kiriting" required />
                </div>
            </div>
            <div class="error-msg" id="registerError"></div>
            <button type="submit" class="submit-btn">
                <span>Ro'yxatdan o'tish</span>
                <div class="btn-loader" id="registerLoader" style="display:none"></div>
            </button>
        </form>



        <!-- Loyiha haqida -->
        <a href="landing.html" class="submit-btn"
            style="background: linear-gradient(135deg, #8b5cf6, #6d28d9); text-decoration: none; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <span style="font-size: 1.2rem;">🏆</span>
            <span>Loyiha haqida – Prezentatsiya</span>
        </a>

    </div>

    <script src="js/auth.js"></script>
    <script src="js/titlebar.js"></script>

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => { });
        }
    </script>
</body>
