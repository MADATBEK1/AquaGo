[build]
  publish = "."
  functions = "netlify/functions"

# API redirects - barcha /api/* so'rovlar serverless functionga yo'naltiriladi
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Netlify dagi asosiy sahifani (/) landing.html ga yo'naltiramiz
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
